name: Test Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: test_smartresume
        ports:
          - 5432:5432
          
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Push Database Schema
        run: npx prisma db push
        env:
          DATABASE_URL: postgresql://test:testpassword@localhost:5432/test_smartresume
          DIRECT_URL: postgresql://test:testpassword@localhost:5432/test_smartresume
          
      - name: Run Unit & Integration Tests (Jest)
        run: npm run test:unit
        env:
          DATABASE_URL: postgresql://test:testpassword@localhost:5432/test_smartresume
          NEXTAUTH_SECRET: test-secret-1234567890-abcdef
          NEXTAUTH_URL: http://localhost:3000
          ML_SERVICE_URL: http://localhost:8000
          
      - name: Run Cypress E2E Tests
        uses: cypress-io/github-action@v5
        with:
          build: npm run build
          start: npm run start
          wait-on: 'http://localhost:3000'
        env:
          DATABASE_URL: postgresql://test:testpassword@localhost:5432/test_smartresume
          NEXTAUTH_SECRET: test-secret-1234567890-abcdef
          NEXTAUTH_URL: http://localhost:3000
          ML_SERVICE_URL: http://localhost:8000
